services:
  app:
    cap_drop:
    - ALL
    command:
    - sh
    - -c
    - npm install && npm start
    cpus: 2.0
    image: node:20-bookworm
    mem_limit: 4g
    pids_limit: 512
    ports:
    - target: 3000
    security_opt:
    - no-new-privileges:true
    user: 1000:1000
    working_dir: /workspace/repo
