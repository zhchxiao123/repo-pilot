services:
  web:
    build:
      context: .
    command: python app.py
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://app:app@db/app
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
